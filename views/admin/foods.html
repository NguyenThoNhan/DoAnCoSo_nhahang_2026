<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Món ăn — Smart Restaurant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/public/css/common.css">
    <link rel="stylesheet" href="/public/css/admin/layout.css">
    <link rel="stylesheet" href="/public/css/admin/components.css">
    <link rel="stylesheet" href="/public/css/admin/pages.css">

    <style>
        /* ── Foods page extra styles ──────────────────────────── */

        /* Filter category chips bar */
        .foods-filter-bar {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            background: var(--color-white);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-gray-100);
            box-shadow: var(--shadow-card);
            padding: var(--space-4) var(--space-5);
            flex-wrap: wrap;
        }
        .ffb-label {
            font-size: 0.7rem;
            font-weight: var(--font-bold);
            color: var(--color-gray-400);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }
        .ffb-chips {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            overflow-x: auto;
            scrollbar-width: none;
            flex: 1;
        }
        .ffb-chips::-webkit-scrollbar { display: none; }
        .ffb-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0.35rem 0.9rem;
            border-radius: var(--radius-full);
            border: 1.5px solid var(--color-gray-200);
            background: var(--color-white);
            font-family: var(--font-primary);
            font-size: var(--text-xs);
            font-weight: var(--font-semibold);
            color: var(--color-gray-600);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            user-select: none;
        }
        .ffb-chip:hover { border-color: var(--admin-primary); color: var(--admin-primary); background: var(--admin-primary-subtle); }
        .ffb-chip.ffbc-on {
            background: var(--admin-primary);
            border-color: var(--admin-primary);
            color: var(--color-white);
            box-shadow: 0 2px 8px rgba(249,115,22,0.30);
        }
        .ffb-chip-count {
            font-size: 0.6rem;
            font-weight: var(--font-bold);
            background: rgba(0,0,0,0.12);
            padding: 1px 5px;
            border-radius: var(--radius-full);
            line-height: 1.4;
        }
        .ffb-divider { width: 1px; height: 20px; background: var(--color-gray-150); flex-shrink: 0; }
        /* Availability filter */
        .ffb-avail-btns { display: flex; gap: var(--space-2); flex-shrink: 0; }
        .ffb-avail-btn {
            padding: 0.35rem 0.8rem;
            border-radius: var(--radius-full);
            border: 1.5px solid var(--color-gray-200);
            background: var(--color-white);
            font-family: var(--font-primary);
            font-size: var(--text-xs);
            font-weight: var(--font-semibold);
            color: var(--color-gray-500);
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .ffb-avail-btn:hover { border-color: var(--color-gray-400); color: var(--color-gray-700); }
        .ffb-avail-btn.ffba-on { border-color: var(--color-gray-700); background: var(--color-gray-800); color: var(--color-white); }

        /* Summary stats row */
        .foods-stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-3);
        }
        .fsr-card {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            padding: var(--space-4) var(--space-5);
            border: 1px solid var(--color-gray-100);
            box-shadow: var(--shadow-card);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .fsr-icon {
            width: 40px; height: 40px;
            border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .fsr-val   { font-size: var(--text-2xl); font-weight: var(--font-extrabold); color: var(--color-gray-900); letter-spacing: -0.03em; line-height: 1; }
        .fsr-label { font-size: 0.67rem; color: var(--color-gray-400); font-weight: var(--font-medium); margin-top: 2px; }

        /* Food card grid */
        .foods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: var(--space-4);
        }

        /* Food card */
        .food-card {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            border: 1.5px solid var(--color-gray-100);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: all var(--transition-base);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .food-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
            border-color: var(--admin-primary-light);
        }
        /* Unavailable state */
        .food-card.fc-unavailable {
            opacity: 0.62;
            filter: grayscale(0.25);
        }
        .food-card.fc-unavailable:hover { opacity: 0.85; filter: none; }

        /* Card image */
        .fc-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: var(--color-gray-100);
            overflow: hidden;
            flex-shrink: 0;
        }
        .fc-img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }
        .food-card:hover .fc-img { transform: scale(1.06); }
        .fc-img-placeholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: var(--space-2);
            color: var(--color-gray-300);
        }
        .fc-img-placeholder i { font-size: 2rem; }
        .fc-img-placeholder span { font-size: 0.65rem; }

        /* Badges on image */
        .fc-badges {
            position: absolute;
            top: var(--space-3);
            left: var(--space-3);
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
            z-index: 2;
        }
        .fc-badge-featured {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px;
            background: var(--admin-primary);
            color: var(--color-white);
            border-radius: var(--radius-full);
            font-size: 0.6rem;
            font-weight: var(--font-extrabold);
            box-shadow: 0 2px 8px rgba(249,115,22,0.35);
        }
        .fc-badge-unavailable {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px;
            background: rgba(0,0,0,0.65);
            color: var(--color-white);
            border-radius: var(--radius-full);
            font-size: 0.6rem;
            font-weight: var(--font-extrabold);
            backdrop-filter: blur(4px);
        }

        /* Quick actions overlay (show on hover) */
        .fc-overlay {
            position: absolute;
            top: var(--space-3);
            right: var(--space-3);
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
            z-index: 2;
            opacity: 0;
            transform: translateX(6px);
            transition: all var(--transition-fast);
        }
        .food-card:hover .fc-overlay { opacity: 1; transform: translateX(0); }
        .fc-ov-btn {
            width: 30px; height: 30px;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem;
            transition: all var(--transition-fast);
            backdrop-filter: blur(8px);
        }
        .fc-ov-edit   { background: rgba(255,255,255,0.92); color: var(--color-gray-700); }
        .fc-ov-edit:hover   { background: var(--color-white); color: var(--admin-primary); }
        .fc-ov-delete { background: rgba(239,68,68,0.85); color: var(--color-white); }
        .fc-ov-delete:hover { background: #DC2626; }
        .fc-ov-toggle { background: rgba(255,255,255,0.92); color: var(--color-gray-600); }
        .fc-ov-toggle:hover { background: var(--color-white); color: var(--color-info); }

        /* Card body */
        .fc-body {
            padding: var(--space-4) var(--space-5);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }
        .fc-cat-tag {
            font-size: 0.62rem;
            font-weight: var(--font-bold);
            color: var(--admin-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .fc-name {
            font-size: var(--text-sm);
            font-weight: var(--font-extrabold);
            color: var(--color-gray-900);
            line-height: var(--leading-snug);
            letter-spacing: -0.01em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .fc-desc {
            font-size: 0.67rem;
            color: var(--color-gray-400);
            line-height: var(--leading-relaxed);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }
        .fc-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-5);
            border-top: 1px solid var(--color-gray-100);
            background: var(--color-gray-50);
        }
        .fc-price {
            font-size: var(--text-base);
            font-weight: var(--font-extrabold);
            color: var(--color-gray-900);
            letter-spacing: -0.02em;
        }
        .fc-status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .fcs-available   { background: var(--color-success); box-shadow: 0 0 0 3px rgba(16,185,129,0.18); }
        .fcs-unavailable { background: var(--color-gray-300); }

        /* List view */
        .foods-list-view { display: flex; flex-direction: column; gap: var(--space-2); }
        .food-list-row {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            border: 1.5px solid var(--color-gray-100);
            box-shadow: var(--shadow-card);
            padding: var(--space-3) var(--space-5);
            display: flex;
            align-items: center;
            gap: var(--space-4);
            transition: all var(--transition-fast);
        }
        .food-list-row:hover { border-color: var(--admin-primary-light); box-shadow: var(--shadow-md); }
        .food-list-row.flr-unavailable { opacity: 0.65; }
        .flr-img {
            width: 52px; height: 52px;
            border-radius: var(--radius-lg);
            object-fit: cover;
            background: var(--color-gray-100);
            flex-shrink: 0;
        }
        .flr-info { flex: 1; min-width: 0; }
        .flr-name { font-size: var(--text-sm); font-weight: var(--font-bold); color: var(--color-gray-900); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .flr-meta { font-size: var(--text-xs); color: var(--color-gray-400); margin-top: 2px; }
        .flr-price { font-size: var(--text-sm); font-weight: var(--font-extrabold); color: var(--color-gray-900); flex-shrink: 0; letter-spacing: -0.01em; white-space: nowrap; }
        .flr-actions { display: flex; gap: var(--space-2); flex-shrink: 0; }

        /* Image upload dropzone */
        .upload-dropzone {
            border: 2px dashed var(--color-gray-300);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            background: var(--color-gray-50);
            position: relative;
            overflow: hidden; /* clip input[type=file] trong dropzone */
        }
        .upload-dropzone:hover,
        .upload-dropzone.dz-over { border-color: var(--admin-primary); background: var(--admin-primary-subtle); }
        .upload-dropzone input[type="file"] {
            display: none; /* ẩn hoàn toàn, JS dùng click() để trigger */
        }
        .dz-icon { font-size: 2rem; color: var(--color-gray-300); margin-bottom: var(--space-2); }
        .upload-dropzone:hover .dz-icon,
        .upload-dropzone.dz-over .dz-icon { color: var(--admin-primary); }
        .dz-text { font-size: var(--text-sm); font-weight: var(--font-semibold); color: var(--color-gray-600); }
        .dz-hint { font-size: var(--text-xs); color: var(--color-gray-400); margin-top: 3px; }

        /* Preview strip */
        .upload-preview-strip {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            background: var(--color-gray-50);
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            margin-top: var(--space-3);
        }
        .ups-img { width: 52px; height: 52px; border-radius: var(--radius-md); object-fit: cover; flex-shrink: 0; }
        .ups-info { flex: 1; min-width: 0; }
        .ups-name { font-size: var(--text-xs); font-weight: var(--font-semibold); color: var(--color-gray-800); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ups-size { font-size: 0.65rem; color: var(--color-gray-400); margin-top: 2px; }
        .ups-remove {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: none;
            background: var(--color-error-light);
            color: var(--color-error);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.72rem;
            flex-shrink: 0;
            transition: all var(--transition-fast);
        }
        .ups-remove:hover { background: var(--color-error); color: var(--color-white); }

        /* Empty state */
        .foods-empty {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-16) var(--space-8);
            text-align: center;
            gap: var(--space-4);
        }
        .fe-icon  { font-size: 3rem; opacity: 0.2; }
        .fe-title { font-size: var(--text-xl); font-weight: var(--font-extrabold); color: var(--color-gray-400); }
        .fe-desc  { font-size: var(--text-sm); color: var(--color-gray-400); max-width: 280px; line-height: var(--leading-relaxed); }

        /* Skeleton */
        .skeleton { animation: sk-pulse 1.5s ease infinite; }
        .sk-block { background: var(--color-gray-100); border-radius: var(--radius-md); }
        @keyframes sk-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Modal footer sticky */
        .modal-foot-sticky {
            position: sticky;
            bottom: 0;
            background: var(--color-white);
            border-top: 1px solid var(--color-gray-100);
            padding: var(--space-4) var(--space-6);
            display: flex;
            justify-content: flex-end;
            gap: var(--space-3);
            z-index: 1;
        }

        /* ── Modal: chỉ override max-width — common.css đã định nghĩa đủ hệ thống modal ── */
        /* .modal-overlay { display:flex; opacity:0; visibility:hidden }        */
        /* .modal-overlay.active { opacity:1; visibility:visible }              */
        /* .modal-overlay.active .modal { transform: translateY(0) scale(1) }  */
        #foodModal   .modal { max-width: 680px; }
        #deleteModal .modal { max-width: 440px; }
    </style>
</head>
<body>

<div class="admin-app" id="adminApp">

    <!-- Sidebar -->
    <div id="admin-sidebar-container"></div>

    <main class="admin-main" id="adminMain">

        <!-- ── Topbar ── -->
        <header class="admin-topbar">
            <div class="topbar-left">
                <div class="topbar-title">Quản lý Món ăn</div>
                <nav class="topbar-breadcrumb">
                    <a href="/views/admin/index.html">Dashboard</a>
                    <span class="separator">/</span>
                    <span class="current">Thực đơn</span>
                    <span class="separator">/</span>
                    <span class="current">Món ăn</span>
                </nav>
            </div>

            <div class="topbar-search">
                <i class="fas fa-search topbar-search-icon"></i>
                <input type="text" id="globalSearch" placeholder="Tìm theo tên món...">
            </div>

            <div class="topbar-actions">
                <button class="topbar-action-btn" id="btnRefresh" title="Làm mới">
                    <i class="fas fa-rotate-right"></i>
                </button>
                <a href="/views/admin/food-create.html" class="btn btn-primary btn-sm">
                    <i class="fas fa-plus"></i> Thêm món
                </a>
            </div>
        </header>

        <!-- ── Content ── -->
        <div class="admin-content">

            <!-- Page header -->
            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="page-heading">Thực đơn <span id="foodCount"></span></h1>
                    <p class="page-desc">Quản lý món ăn, giá cả và trạng thái phục vụ</p>
                </div>
                <div class="page-header-actions">
                    <!-- View toggle grid / list -->
                    <div class="view-toggle">
                        <button class="vt-btn vt-active" id="btnViewGrid" title="Lưới">
                            <i class="fas fa-grip"></i>
                        </button>
                        <button class="vt-btn" id="btnViewList" title="Danh sách">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stats row -->
            <div class="foods-stats-row" id="foodsStatsRow">
                <div class="fsr-card">
                    <div class="fsr-icon dki-orange"><i class="fas fa-utensils"></i></div>
                    <div><div class="fsr-val" id="statTotal">--</div><div class="fsr-label">Tổng món</div></div>
                </div>
                <div class="fsr-card">
                    <div class="fsr-icon dki-green"><i class="fas fa-circle-check"></i></div>
                    <div><div class="fsr-val" id="statAvail">--</div><div class="fsr-label">Đang bán</div></div>
                </div>
                <div class="fsr-card">
                    <div class="fsr-icon dki-red"><i class="fas fa-ban"></i></div>
                    <div><div class="fsr-val" id="statUnavail">--</div><div class="fsr-label">Tạm ngưng</div></div>
                </div>
                <div class="fsr-card">
                    <div class="fsr-icon dki-purple" style="background:#EDE9FE;color:#7C3AED"><i class="fas fa-star"></i></div>
                    <div><div class="fsr-val" id="statFeatured">--</div><div class="fsr-label">Nổi bật</div></div>
                </div>
            </div>

            <!-- Filter bar -->
            <div class="foods-filter-bar" id="filterBar">
                <span class="ffb-label"><i class="fas fa-filter"></i> Lọc</span>
                <div class="ffb-chips" id="catChips">
                    <button class="ffb-chip ffbc-on" data-cat="all">
                        Tất cả <span class="ffb-chip-count" id="chipCountAll">0</span>
                    </button>
                    <!-- Dynamic category chips -->
                </div>
                <div class="ffb-divider"></div>
                <div class="ffb-avail-btns">
                    <button class="ffb-avail-btn ffba-on" data-avail="all">Tất cả</button>
                    <button class="ffb-avail-btn" data-avail="1">
                        <i class="fas fa-circle" style="font-size:6px;color:var(--color-success)"></i> Đang bán
                    </button>
                    <button class="ffb-avail-btn" data-avail="0">
                        <i class="fas fa-ban" style="font-size:8px;color:var(--color-gray-400)"></i> Tạm ngưng
                    </button>
                </div>
                <div class="ffb-divider"></div>
                <!-- Sort select -->
                <select class="ifb-select" id="sortSelect" style="height:36px">
                    <option value="name_asc">Tên A→Z</option>
                    <option value="name_desc">Tên Z→A</option>
                    <option value="price_asc">Giá tăng dần</option>
                    <option value="price_desc">Giá giảm dần</option>
                    <option value="featured">Nổi bật trước</option>
                </select>
            </div>

            <!-- Results bar -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3)">
                <div style="font-size:var(--text-sm);color:var(--color-gray-500)">
                    Hiển thị <strong id="resultCount">0</strong> món
                </div>
                <button class="btn btn-ghost btn-xs" id="btnClearFilter" style="display:none">
                    <i class="fas fa-xmark"></i> Xoá bộ lọc
                </button>
            </div>

            <!-- Food grid (default) -->
            <div class="foods-grid" id="foodsGrid">
                <!-- skeleton -->
            </div>

            <!-- Food list view (hidden by default) -->
            <div class="foods-list-view" id="foodsListView" style="display:none">
                <!-- JS render -->
            </div>

        </div><!-- /admin-content -->
    </main>
</div><!-- /admin-app -->

<!-- ══════════════════════════════════════════
     MODAL: Delete Confirm
══════════════════════════════════════════ -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width:440px">
        <div class="modal-header">
            <div class="modal-title">Xác nhận xoá món</div>
            <button class="modal-close" id="deleteModalClose"><i class="fas fa-xmark"></i></button>
        </div>
        <div style="padding:var(--space-6);text-align:center">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--color-error-light);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-4);font-size:1.6rem;color:var(--color-error)">
                <i class="fas fa-trash"></i>
            </div>
            <div style="font-size:var(--text-lg);font-weight:var(--font-extrabold);color:var(--color-gray-900);margin-bottom:var(--space-2)">Xoá món này?</div>
            <div style="font-size:var(--text-sm);color:var(--color-gray-500);margin-bottom:var(--space-6)">
                Món <strong id="deleteTargetName"></strong> sẽ bị xoá vĩnh viễn và không thể khôi phục.
            </div>
            <div style="display:flex;gap:var(--space-3);justify-content:center">
                <button class="btn btn-ghost" id="btnDeleteCancel" style="flex:1">Huỷ bỏ</button>
                <button class="btn btn-danger" id="btnDeleteConfirm" style="flex:1">
                    <i class="fas fa-trash"></i> Xoá vĩnh viễn
                </button>
            </div>

    </div>
</div>
